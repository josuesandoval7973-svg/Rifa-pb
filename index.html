<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rifa Palos Blancos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: black;
      color: white;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
    }

    h1 { margin: 20px 0 5px 0; font-size: 2.5em; }
    p { font-size: 1.2em; margin: 5px 0; }

    .boletos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
      gap: 10px;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .boleto {
      background: white;
      color: black;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    .boleto:hover { transform: scale(1.05); }

    .seleccionado { background: #25D366; color: white; }
    .vendido { background: #555; color: #fff; cursor: not-allowed; }

    .boton, .azarBtn {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background: #25D366;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-size: 16px;
      transition: 0.3s;
      cursor: pointer;
    }

    .boton:hover, .azarBtn:hover { transform: scale(1.05); background: #128C7E; }

    footer {
      margin: 20px 0;
      font-size: 1em;
      color: #ccc;
    }

    input[type="number"] {
      padding: 5px;
      font-size: 16px;
      border-radius: 5px;
      margin-top: 10px;
      width: 150px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <img src="https://i.imgur.com/H5GfYb0.jpg" alt="Moto FT150 Negra">
</header>

<h1>🎟️ Rifa Palos Blancos</h1>
<p>Selecciona tus boletos o deja que la máquina elija por ti</p>
<p>Fecha del sorteo: <strong>10 de junio 2026</strong></p>
<p>Precio: <strong>$50 MXN</strong> cada boleto</p>

<div class="boletos" id="listaBoletos"></div>

<input type="number" id="cantidadAzar" placeholder="Número de boletos a azar" min="1" max="500">
<button class="azarBtn" id="azarBtn">🎲 Lanzar la máquina</button>

<a class="boton" id="whatsappBtn" target="_blank">Apartar por WhatsApp 📲</a>

<footer>
  ¡Buena suerte! 🍀
</footer>

<script>
  let numero = "5216871820645"; // tu WhatsApp
  let precio = 50;
  let seleccionados = [];
  const contenedor = document.getElementById("listaBoletos");

  // Boletos ya vendidos (ejemplo)
  const vendidos = [3, 5, 14, 19, 26, 62, 67];

  const totalBoletos = 500;

  // Generar boletos
  for (let i = 1; i <= totalBoletos; i++) {
    const div = document.createElement("div");
    div.classList.add("boleto");
    div.innerText = i;

    if (vendidos.includes(i)) {
      div.classList.add("vendido");
    } else {
      div.onclick = () => {
        if (seleccionados.includes(i)) {
          seleccionados = seleccionados.filter(n => n !== i);
          div.classList.remove("seleccionado");
        } else {
          seleccionados.push(i);
          div.classList.add("seleccionado");
        }
      };
    }

    contenedor.appendChild(div);
  }

  // Botón WhatsApp
  document.getElementById("whatsappBtn").onclick = () => {
    if (seleccionados.length === 0) {
      alert("Selecciona al menos un número");
      return;
    }
    const total = seleccionados.length * precio;
    const mensaje = `Hola, quisiera apartar estos boletos: ${seleccionados.join(", ")}\n\n¡Creeré en mi suerte! 🍀\nTotal: $${total} MXN`;
    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`);
  };

  // Máquina de azar
  document.getElementById("azarBtn").onclick = () => {
    const cantidad = parseInt(document.getElementById("cantidadAzar").value);
    if (!cantidad || cantidad < 1) return alert("Ingresa una cantidad válida");

    const disponibles = [];
    for (let i = 1; i <= totalBoletos; i++) {
      if (!vendidos.includes(i) && !seleccionados.includes(i)) disponibles.push(i);
    }

    if (cantidad > disponibles.length) return alert("No hay suficientes boletos disponibles");

    for (let j = 0; j < cantidad; j++) {
      const azarIndex = Math.floor(Math.random() * disponibles.length);
      const boleto = disponibles.splice(azarIndex,1)[0];
      seleccionados.push(boleto);

      const div = contenedor.children[boleto-1];
      div.classList.add("seleccionado");
    }
  };
</script>

</body>
</html>
