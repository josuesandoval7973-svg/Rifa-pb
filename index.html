<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rifa Palos Blancos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #2c5364);
      color: white;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 { margin-top: 30px; font-size: 2.5em; }
    p { font-size: 1.2em; }

    .boletos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 10px;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .boleto {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    .boleto:hover { transform: scale(1.05); }

    .seleccionado { background: #25D366; color: white; }
    .vendido { background: #999; color: #fff; cursor: not-allowed; }

    .boton {
      display: inline-block;
      margin: 20px;
      padding: 15px 25px;
      background: #25D366;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    .boton:hover { transform: scale(1.05); background: #128C7E; }
  </style>
</head>

<body>
  <h1>🎟️ Rifa Palos Blancos</h1>
  <p>Selecciona tus boletos y aparta por WhatsApp</p>

  <div class="boletos" id="listaBoletos"></div>

  <a class="boton" id="whatsappBtn" target="_blank">Apartar por WhatsApp 📲</a>

  <script>
    // Tu número WhatsApp
    let numero = "5216871820645"; // sin + ni espacios
    let precio = 50; // Precio por boleto

    let seleccionados = [];
    const contenedor = document.getElementById("listaBoletos");

    // Lista de boletos vendidos (ejemplo: 3, 5, 10)
    const vendidos = [3,5,14,19,67]; 

    // Generar 500 boletos
    for (let i = 1; i <= 500; i++) {
      const div = document.createElement("div");
      div.classList.add("boleto");
      div.innerText = i;

      if (vendidos.includes(i)) {
        div.classList.add("vendido");
      } else {
        div.onclick = () => {
          if (seleccionados.includes(i)) {
            seleccionados = seleccionados.filter(n => n !== i);
            div.classList.remove("seleccionado");
          } else {
            seleccionados.push(i);
            div.classList.add("seleccionado");
          }
        };
      }

      contenedor.appendChild(div);
    }

    // Botón WhatsApp
    document.getElementById("whatsappBtn").onclick = () => {
      if (seleccionados.length === 0) {
        alert("Selecciona al menos un número");
        return;
      }

      const total = seleccionados.length * precio;
      const mensaje = `Hola, quisiera apartar estos boletos: ${seleccionados.join(", ")}\n\n¡Creeré en mi suerte! 🍀\nTotal: $${total} MXN`;
      window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`);
    };
  </script>
</body>
</html>
