<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rifa Palos Blancos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #2c5364);
      color: white;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 2.5em;
    }

    p {
      font-size: 1.2em;
    }

    .boton {
      display: inline-block;
      margin: 20px;
      padding: 15px 25px;
      background: #25D366;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    .boton:hover {
      transform: scale(1.05);
      background: #128C7E;
    }
  </style>
</head>

<body>

  <h1>🎟️ Rifa Palos Blancos</h1>
  <p>Bienvenido, selecciona tus boletos y aparta vía WhatsApp</p>

  <a class="boton" id="whatsappBtn" target="_blank">Apartar por WhatsApp 📲</a>

  <script>
    // Cambia tu número aquí
    let numero = "5216871820645"; // ← tu número WhatsApp sin + ni espacios

    document.getElementById("whatsappBtn").onclick = () => {
      let mensaje = "Hola, quiero apartar boletos"; 
      window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`);
    };
  </script>

</body>
</html>
