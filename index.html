<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa Moto FT150 Negra</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f0f0; text-align: center; }
  .container { max-width: 900px; margin: 30px auto; background: #fff; padding: 20px; border-radius: 10px; }
  img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
  #buttons { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 5px; }
  button { background: #25D366; color: #fff; border: none; padding: 8px; border-radius: 6px; }
  button:disabled { background: #ccc; }
</style>
</head>
<body>

<div class="container">
  <h1>Rifa Moto FT150 Negra</h1>
  <img src="moto-ft150-negra.jpg" style="width:100%; max-height:500px; object-fit:cover; border-radius:10px;">
  <p>Precio: $50 MXN</p>
  <p>Disponibles: <span id="available">500</span></p>

  <div id="buttons"></div>
</div>

<script>
const miWhatsApp = "5216871820645"; // CAMBIA ESTO
const totalBoletos = 500;

// 👇 BOLETOS YA PAGADOS
const boletosVendidos = [4,5,6,9,14,17,19,23,24,46,67,79];

const buttonsDiv = document.getElementById('buttons');

// Crear botones
for(let i = 1; i <= totalBoletos; i++){
  const btn = document.createElement('button');
  btn.textContent = "#" + i;

  if(boletosVendidos.includes(i)){
    btn.disabled = true; // ya vendido
  }

  btn.onclick = () => {
    if(boletosVendidos.includes(i)){
      alert("Este boleto ya está vendido");
      return;
    }

    boletosVendidos.push(i);
    btn.disabled = true;

    document.getElementById('available').textContent = totalBoletos - boletosVendidos.length;

    const mensaje = encodeURIComponent("Hola, quiero el boleto #" + i);
    window.open(`https://wa.me/${miWhatsApp}?text=${mensaje}`);
  };

  buttonsDiv.appendChild(btn);
}

// actualizar contador inicial
document.getElementById('available').textContent = totalBoletos - boletosVendidos.length;
</script>

</body>
</html>
